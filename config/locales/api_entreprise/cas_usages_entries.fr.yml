        introduction:
          title: Éditeurs, intégrez l'API Entreprise dans vos logiciels à destination du secteur public
          content: |+
             {:.fr-text--lead}
             Connectez vos logiciels destinés aux administrations et aux collectivtés à l'API Entreprise ! En rendant accessibles des données administratives, notre API simplifie les démarches des entreprises et des associations et facilite le quotidien des agents publics.
        role:
          title: Le rôle d’API Entreprise et votre place en tant qu'éditeur
          anchor: 'role-api-entreprise'
          content: |+
            {:.fr-h4}
            ### Un accès sous conditions

            Sous certaines conditions, les prestataires privés d'un acteur public peuvent se voir délivrer un accès à l'API Entreprise.

            {:.fr-highlight.fr-highlight--caution}
            Attention, la connexion d’un éditeur à l’API Entreprise est possible mais **le prestataire ne peut en aucun cas être destinataire des données** issues de l’API Entreprise. <br>Si le logiciel de l'éditeur s'adresse aussi à des utilisateurs non-éligibles, tels que des acteurs privés, **l'éditeur doit s'assurer que les données de l'API Entreprise ne seront accessibles qu'aux seuls utilisateurs habilités.**

            Vos engagements, une fois habilité, sont explicités dans nos [conditions générales d'utilisation](<%= cgu_path %>).

            {:.fr-h4}
            ### Une simplification des démarches pour vos utilisateurs et leurs usagers

            {:.fr-text--lg}
            Éditeurs, en intégrant la brique API Entreprise dans votre logiciel, les administrations et les collectivités :

            - 🗄 **accèdent facilement aux données publiques et protégées 🔐** de l'Insee, d'Infogreffe, de la DGFIP, de l'Urssaf... ;
            - 🎢 **augmentent le pourcentage des démarches finalisées**, en accélérant les procédures pour les entreprises et les associations grâce au préremplissage des champs avec de la donnée ouverte ;
            - ⏰ **instruisent plus rapidement les dossiers** car elles n'ont pas de vérifications supplémentaires à réaliser, **les informations obtenues de l'API Entreprise étant certifiées 🔎** ;
            - 🔄 **suivent plus facilement les prestataires** car vous pouvez automatiser la mise à jour des documents, _telle que l'attestation de vigilance_ ;
            - 🎯 **participent activement à la simplification des démarches pour les citoyens**, en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à une entreprise/association une information qu'elle a déjà donnée ou que l'administration connaît déjà. <br>Elles se mettent ainsi **en conformité avec la législation** et, plus particulièrement l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.

