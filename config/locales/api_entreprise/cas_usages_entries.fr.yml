        comments_endpoints:
            "insee/etablissements_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> Préremplir les informations d'un **établissement et de son unité légale, à partir de son numéro de SIRET** : _raison sociale, forme juridique, catégorie micro/TPE/PME de l'unité légale. Tranche effectif (année N-2 ou N-3), activité principale et date de création de l'établissement et de l'unité légale. Indique aussi si l'unité légale est de l'économie sociale et solidaire (ESS)._"

            "insee/etablissements": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des établissements \"en diffusion partielle\".<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

            "infogreffe/mandataires_sociaux": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Identité précise des mandataires sociaux : _nom, prénom, date de naissance dont le jour, la commun et le pays de naissance_. Donnée sensible : usage à justifier.<br><br>💡 Le mandataires sociaux sont aussi disponibles avec l'API Extrait RCS d'Infogreffe (nom, prénom et mois de naissance uniquement)."

            "infogreffe/rcs/extrait": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir presque toutes les informations contenues dans un **Kbis**, telles que _le nom commercial et la dénomination de l'unité légale._<br>💡 _Depuis le 23 novembre 2021, l'extrait K-bis ne peut plus être demandé à l'entreprise. [Consulter le décrêt](https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000043523039){:target='_blank'}_."

            "insee/unites_legales_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_."

            "insee/unites_legales": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_."

            "insee/siege_social_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> À&nbsp;partir du Siren de l'unité légale, récupérez les informations du siège social."

            "insee/siege_social": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des sièges sociaux \"en diffusion partielle\"..<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

            "insee/adresse_etablissements_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_"

            "insee/adresse_etablissements": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_"

            "insee/successions": "<span class='fr-badge fr-badge--sm fr-badge--purple-glycine fr-badge--new'>Suivi</span> Le SIRET d'un établissement peut évoluer dans le temps, _par exemple lors d'un changement d'adresse_. Cette API permet de retrouver les établissements prédecesseurs et successeurs d'un établissement et précise s'il s'agit d'un changement de siège, et s'il y a continuité économique."

            "ministere_interieur/rna": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les informations d'une **association** telles que _le nom, l'objet, l'adresse du siège et la date de création._"

            "djepva/associations": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Informations d'une association** (unité légale et établissement) telles que _l'identité, la forme juridique, la date de création, les activités principales, le régime, les adresses, les agréments, les représentants légaux, les effectifs salariés-bénévoles-volontaires et les adhérents._<br><br>**Informations financières** : Comptes de résultats et financement, comptes du dernier exercice clôt, budget prévisionnel et rapport du commissaire au compte de l'association."

            "djepva/associations_open_data": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> **Informations d'une association** (unité légale et établissement) **en open data** et qui peuvent donc être utilisées pour pré-remplir la démarche, sans pré-authentification de l'usager."

            "ministere_interieur/documents_associations": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès aux documents d'une association."

            "inpi/rne/beneficiaires_effectifs": "Bénéficiaires effectifs de l'unité légale."

            "inpi/rne/actes_bilans": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Vérification de capacité économique et financière** : Consulter les actes pour se renseigner sur l'historique des modifications de l'unité légale et vérifier les associés. Consulter les bilans pour vérifier les capitaux propres, chiffre d'affaire et encours."

            "commission_europeenne/numero_tva": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> Préremplir le numéro de TVA certifié.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Permettre à l'instructeur de vérifier la validité du numéro de TVA.<br/><br/>Cette API ne fonctionne que pour les entreprises ayant un Siren et un numéro de TVA au format français."

            "fabrique_numerique_ministeres_sociaux/conventions_collectives": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Pré-lister les **conventions collectives** avec un lien vers Légifrance."

            "cma_france/rnm": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les informations d'identité d'une **entreprise artisanale, à partir de son SIREN** : _Dénomination sociale, forme juridique, effectif salarié, date d'immatriculation au RNM, adresse_ d'une entreprise artisanale."

            "gip_mds/effectifs_annuels_unite_legale" : "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**effectif précis annuel de l'unité légale** _sous réserve d'en justifier l'usage_.<br/><br/>💡La tranche de l'effectif salarié (année N-2 ou N-3) est appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"."

            "gip_mds/effectifs_mensuels_etablissement" : "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**effectif précis mensuel de l'établissement** _sous réserve d'en justifier l'usage_.<br/><br/>💡La tranche de l'effectif salarié (année N-2 ou N-3) est appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"."

            "douanes/immatriculation_eori": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span>  Préremplir à partir du SIRET le numéro EORI d'une entreprise ayant réalisé son immatriculation en France. <br/><br/><span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Permettre à l'instructeur de vérifier la validité du numéro EORI."

            "dgfip/chiffres_affaires": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur aux **trois derniers chiffres d'affaires**."

            "inpi/comptes_annuels_rncs": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur aux **comptes annuels**."

            "banque_de_france/bilans": "_Donnée sensible non-nécessaire._"

            "dgfip/liasses_fiscales": "_Donnée sensible non-nécessaire._"

            "dgfip/liens_capitalistiques": "_Donnée sensible non-nécessaire._"

            "dgfip/attestations_fiscales": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**attestation fiscale**."

            "urssaf/attestation_vigilance": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**attestation sociale**."

            "msa/conformites_cotisations": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Indiquer à l'instructeur si une entreprise du régime agricole a bien versé ses **cotisations auprès de la MSA**."

            "probtp/conformites_cotisations_retraite": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Indiquer à l'instructeur si une entreprise du BTP est à bien a bien versé ses **cotisations retraites**."

            "fntp/carte_professionnelle_travaux_public": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à la **carte professionnelle** de la fédération nationale des travaux publics, indiquant que l'entreprise est à jour de ses cotisations congés payés, et donnant vue sur ses qualifications professionnelles."

            "cnetp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**attestation congés payés CNETP** qui concerne les entreprises de travaux publics."

            "cibtp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès à l'instructeur à l'**attestation congés payés CIBTP** qui concerne les entreprises du bâtiment."

            "agence_bio/certifications_bio": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les **certifications en BIO** d'une entreprise."

            "ademe/certifications_rge": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les **qualifications Reconnu Garant de l'Environnement** et donner accès au certificat PDF."

            "qualibat/certifications_batiment": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Donner accès au **certificat Qualibat** en PDF"

            "qualifelec/certificats": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span>Préremplir les **qualifications Qualifelec_** de l'entreprise et donner accès au **certificat en PDF*."

            "opqibi/qualifications_ingenierie": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les **qualifications OPQIB** et donner accès au certificat PDF."

            "carif_oref/certifications_qualiopi_france_competences": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Préremplir les **certifications Qualiopi et habilitations France Compétences** de l'établissement."
        introduction:
          title: Accédez directement aux justificatifs pour instruire les démarches de votre portail GRU !
          content: |
            {:.fr-text--lead}
            Administrations et collectivités, API Entreprise propose un accès direct aux documents des entreprises & associations. Depuis leur logiciel, vos agents habilités récupèrent les données et documents administratifs nécessaires à l'instruction des démarches proposées sur votre portail relation usager.


            _Si votre portail est uniquement dédié aux demandes d'aides & subventions_, nous vous recommandons le [cas d'usage aides publiques](<%= cas_usage_path(uid: 'aides_publiques') %>).
        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
            Administrations et collectivités, en intégrant la brique API Entreprise dans votre portail GRU et votre système d'information :

            - 🗄 Vous **accédez facilement aux données publiques et protégées 🔐** de l'Insee, d'Infogreffe, de la DGFIP, de l'Urssaf... ;

            - ⏰ Vous **accélérez le traitement des démarches sur votre portail** car vos agents instructeurs n'ont pas de vérifications supplémentaires à réaliser, **les informations obtenues de l'API Entreprise étant certifiées 🔎** ;

            - 🎢 Vous **augmentez le pourcentage des démarches finalisées** car vous faîtes gagner du temps à l'usager ;

            - 🎯 Enfin, vous **participez activement à la simplification des démarches pour les citoyens**, en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à une entreprise/association une information qu'elle a déjà donnée ou que l'administration connaît déjà. <br />Vous vous mettez ainsi **en conformité avec la législation** et, plus particulièrement l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.

        use_case_examples:
          title: Exemples d'applications
          anchor: 'use_case_examples'
          content: |+
            {:.fr-h4}
            ### Une entreprise ou une association effectue une démarche sur votre portail GRU connecté à API Entreprise&nbsp;:


            1. **Elle renseigne son identifiant** (Siret ou RNA) :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API Entreprise est effectué.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1a.png') %>){:width="600px"}

            2. **Les informations administratives la concernant sont pré-remplies automatiquement**. Elle les corrige si besoin et poursuit sa démarche :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : À partir du format structuré (.json) transmis par l'API Entreprise, vous choisissez la façon d'afficher l'information sur votre site.
               ⚠️ Seule de la donnée ouverte peut être pré-remplie. Les données protégées ne doivent jamais être accessibles depuis le site public de votre portail.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1b.png') %>){:width="600px"}

            3. **Avant d'envoyer sa demande, une liste des justificatifs nécessaires pour valider la démarche est présentée**. Les documents déjà disponibles par API Entreprise n'ont pas besoin d'être téléchargés :

               {:.fr-highlight.fr-highlight--example}
               💡 Quand la donnée est indisponible dans API Entreprise, permettez le dépôt des documents manquants pour simplifier le parcours de vos usagers.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1c.png') %>){:width="600px"}


            4. **La demande est réceptionnée par l'instructeur, toutes les informations et justificatifs sont regroupés dans un même espace**. L'instructeur n'a pas à vérifier l'exactitude des données car elles sont certifiées.
               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1d.png') %>){:width="600px"}


            Le cas d'usage [Portail GRU - Préremplissage](<%= cas_usage_path(uid: 'portail_gru') %>) est suffisant si vous avez seulement besoin des étapes 1 et 2.

            {:.fr-h4}
            ### Un exemple avec Camille, agricultrice et Nicolas, agent territorial :

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Camille a besoin d'un emplacement sur le marché de sa ville pour vendre sa production_. Elle s'est rendue sur le portail informatique de la commune, a sélectionné la démarche, entré son numéro de Siret. Toutes les informations publiques de son entreprise ont été automatiquement pré-remplies, elle peut les modifier si elle repère une erreur.

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            À l'étape suivante, Camille n'aura à fournir qu'un seul justificatif sur les cinq requis. En effet, le portail de sa commune lui fait savoir que les quatre autres documents ont déjà été récupérés auprès des administrations compétentes. Camille n'aura pas besoin de chercher ces documents dans ses dossiers ou de se rendre sur différents sites pour les retrouver. En ce qui concerne le document manquant, Camille n'est pas bloquée dans sa démarche, elle peut l'ajouter dans le formulaire. Elle envoie sa demande.

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Nicolas est agent dans la commune de Camille et chargé d'instruire les demandes des entreprises et associations_. Depuis son espace instructeur, il est habilité à traiter les démarches à et manipuler des informations protégées.
            Nicolas vient de recevoir la démarche de Camille. Depuis la fiche entreprise de l'usagère, il voit d'un coup d’œil que l'ensemble des données et documents nécessaires pour la démarche sont présents. Il n'a pas besoin de vérifier l'existence du numéro de Siret de Camille, ni de vérifier l'absence de faute de frappe dans l'adresse postale. En plus, sur les cinq documents transmis, quatre proviennent de l'API Entreprise, ils sont certifiés.
            Nicolas vérifie donc l'unique document transmis par Camille. Tout est en ordre, il valide la demande d'emplacement de marché.
        list_api:
          content: |+
            {:.fr-text--xl}
            Ce tableau dresse la liste des API utiles pour ce cas d'usage. Utilisez-le pour compléter votre [demande d'habilitation](#request-access).

            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables seront précochées** par défaut dans le formulaire d'accès.
            Les API **️<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> utiles** seront à cocher par vos soins si votre cas d'usage le justifie.
            Les API **<span style="color:#d64d00" class="fr-icon-close-circle-line" aria-hidden="true"></span> injustifiées** ne peuvent être demandées pour ce cas d'usage.


            {:.fr-highlight.fr-highlight--caution}
            Lors de votre demande d'habilitation, **vous vous engagez à ne demander que les données strictement nécessaires** à la réalisation de la démarche administrative. Consulter [nos conditions générales d'utilisation](<%= cgu_path %>){:target="_blank"}.

        users:
          title: Ils utilisent l’API Entreprise
          anchor: 'users'
          content: |+
            {:.fr-h5}
            ### Des communes et intercommunalités

            Le [portail en ligne de la ville de Chambéry](https://simplici.chambery.fr/){:target="_blank"} : une plateforme de démarches à destination des entreprises et des associations.

            {:.fr-h5}
            ### Des régions

            Le [portail GRU de la Région Réunion](https://demarches.cr-reunion.fr/){:target="_blank"} : une plateforme en ligne qui propose également la délivrance d'aides et subventions publiques.

            {:.fr-highlight.fr-highlight--example.fr-text--regular.fr-text--alt.fr-text--lg}
            "_L'accès à l'API entreprise nous permet de faire des contrôles lors de la création de la demande par l'usager (contrôle existence SIREN/SIRET, récupération adresse, ...) et nous permet d'afficher à nos agents des aides à l'instruction (différences entres données fournies par l'usager et les données remontées par l'API: code NAF, dénomination, taille de l'entreprise, ...)._"

            {:.fr-h5}
            ### Parfois au travers d’un éditeur de logiciel :

            {:.fr-table}
            | Éditeurs ayant intégré l'API Entreprise                                             |                                          Solution                                                                            |                     Cas d'usage                       |
            | ----------------------------------------------------------------------------------- | :--------------------------------------------------------------------------------------------------------------------------: | :----------------------------------------------------:|
            | **Efalia** <br> Entreprise privée                                                   | [efalia.com](https://www.efalia.com/) <br> [Solution 6Tzen](https://www.6tzen.fr/){:target="_blank"}                 |                   Portail gestion relation usager       |
            | **Entr’ouvert** <br> Coopérative                                                    | [entrouvert.com](https://www.entrouvert.com) <br> [Publik](https://publik.entrouvert.com/){:target="_blank"}                 |                   Portail de démarches en ligne       |
            | **Lanteas** <br> Entreprise privée                                                    |    [OpenGRU](https://lanteas.com/gestion-relation-usager-open-gru-crm/){:target="_blank"}                     |                  Portail gestion relation usager      |


            _Vous êtes un éditeur proposant une solution de portail de gestion relation usager et ne figurez pas sur cette liste ?_ Veuillez nous contacter à cette adresse e-mail : [support@entreprise.api.gouv.fr](mailto:support@entreprise.api.gouv.fr).
        legal_context:
          content: |+
            L'utilisation des données est encadrée légalement. Vous devez formuler une demande auprès de l'API Particulier en justifiant du cadre légal de l'utilisation des données :

            - **Cadre légal général** : [Article L114-8 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"} ;
            - **Cadre légal spécifique** : le cadre légal général n'est pas suffisant pour vous habiliter. Il est nécessaire de fournir le contexte spécifique de votre administration qui permettra de justifier les données demandées.
        request_access:
          link_datapass: "<%= datapass_base_url %>/api-entreprise/?demarche=portail_gru_instruction"
          content: null
