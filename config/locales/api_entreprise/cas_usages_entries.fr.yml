        introduction:
          title: Pré-remplissez les démarches de votre portail de gestion relation usager !
          content: |
            {:.fr-text--lead}
            Administrations et collectivités, API Entreprise propose l’accès direct aux données ouvertes des entreprises & associations. À partir de l'identifiant RNA ou du numéro de SIRET, vous personnalisez l'expérience en ligne en pré-remplissant automatiquement les champs.
        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
            Administrations et collectivités, en intégrant la brique API Entreprise dans votre site ou portail usager :

            - 🗄 Vous **accédez facilement aux données publiques et protégées 🔐** de l'Insee, d'Infogreffe, de la DGFIP, de l'Urssaf... ;

            - ⏰ Vous **accélérez le traitement des démarches** car vos agents instructeurs n'ont pas de vérifications supplémentaires à réaliser, **les informations obtenues de l'API Entreprise étant certifiées 🔎** ;

            - 🎢 Vous **augmentez le pourcentage des démarches finalisées** car vous faîtes gagner du temps à l'usager ;

            - 🎯 Enfin, vous **participez activement à la simplification des démarches pour les citoyens**, en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à une entreprise/association une information qu'elle a déjà donnée ou que l'administration connaît déjà. <br>Vous vous mettez ainsi **en conformité avec la législation** et l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.
        use_case_examples:
          title: Exemples d'applications
          anchor: 'use_case_examples'
          content: |+
            {:.fr-h4}
            ### Une entreprise ou une association effectue une démarche sur votre portail GRU connecté à API Entreprise&nbsp;:

            1. **Elle renseigne son identifiant** (Siret ou RNA) :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API Entreprise est effectué.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1a.png') %>){:width="600px"}


            2. **Les informations administratives la concernant sont pré-remplies automatiquement**. Elle les corrige si besoin et poursuit sa démarche :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : À partir du format structuré (.json) transmis par l'API Entreprise, vous choisissez la façon d'afficher l'information sur votre site.
               ⚠️ Seule de la donnée ouverte peut être pré-remplie. Les données protégées ne doivent jamais être accessibles depuis le site public de votre portail.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/portail-gru-use_case_example_1b.png') %>){:width="600px"}

            {:.fr-h4}
            ### Un exemple avec Laurent, mandataire d'une association :

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Laurent a besoin d'inscrire son association dans le ficher associatif municipal_ pour réserver une salle à la maison des associations. Laurent se rend sur le portail informatique de sa commune, il sélectionne la démarche "J'inscris ma structure dans le fichier associatif municipal". En début de formulaire, il renseigne son numéro RNA. Le formulaire est automatiquement pré-rempli des informations de l'association : _la forme juridique, la date de création, les activités, le statut d'utilité publique, l'adresse ou encore la tranche de l'effectif_... Tout a déjà été rempli. Laurent vérifie qu'il n'y a pas d'erreur, et envoie sa demande.

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            La demande est traitée de façon automatique car toutes les données nécessaires proviennent de l'API Entreprise et sont certifiées. Quelques secondes après l'envoi de sa demande, Laurent reçoit un e-mail lui confirmant que son association est inscrite au registre, et qu'il a désormais accès à l'outil de réservation de salle.


        list_api:
          content: |+
            {:.fr-text--xl}
            Ce tableau dresse la liste des API utiles pour ce cas d'usage. Utilisez-le pour compléter votre [demande d'habilitation](#request-access). **Seules les données publiques sont accessibles** car il n'est pas possible de s'assurer de l'identité de l'usager.

            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables seront précochées** par défaut dans le formulaire d'accès.
            Les API **️<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> utiles** seront à cocher par vos soins si votre cas d'usage le justifie.
            Les API **<span style="color:#d64d00" class="fr-icon-close-circle-line" aria-hidden="true"></span> injustifiées** ne peuvent être demandées pour ce cas d'usage.


            {:.fr-highlight}
            **Si vous souhaitez accéder à des données protégées pour aider vos agents à instruire les démarches du portail** ou des dossiers d'aides & subventions, il vous faudra faire une demande complémentaire.<br>En savoir plus sur le [cas d'usage portail GRU - Instruction des démarches](<%= cas_usage_path(uid: 'portail_gru_instruction') %>) et le [cas d'usage aides et subventions publiques](<%= cas_usage_path(uid: 'aides_publiques') %>).

        users:
          title: Ils utilisent l’API Entreprise
          anchor: 'users'
          content: |+
            {:.fr-h5}
            ### Des communes et intercommunalités

            Le [portail en ligne de la ville de Chambéry](https://simplici.chambery.fr/){:target="_blank"} : une plateforme de démarches à destination des entreprises et des associations.

            La communauté de communes de Vaison Ventoux dématérialise la demande d'une [carte permettant aux professionnels d’accéder aux déchetteries de son territoire](http://www.vaison-ventoux.fr/cadre-de-vie-solidarite/dechets/l-acces-a-la-carte-de-dechetterie-pour-les-professionnels.htm). Le formulaire accessible sous connexion sécurisée FranceConnect, est directement pré-rempli des informations disponibles par API Entreprise.


            {:.fr-h5}
            ### Des régions

            Le [portail GRU de la Région Réunion](https://demarches.cr-reunion.fr/){:target="_blank"} : une plateforme en ligne qui propose également la délivrance d'aides et subventions publiques.

            {:.fr-highlight.fr-highlight--example.fr-text--regular.fr-text--alt.fr-text--lg}
            "_L'accès à l'API entreprise nous permet de faire des contrôles lors de la création de la demande par l'usager (contrôle existence SIREN/SIRET, récupération adresse, ...) et nous permet d'afficher à nos agents des aides à l'instruction (différences entres données fournies par l'usager et les données remontées par l'API: code NAF, dénomination, taille de l'entreprise, ...)._"

            {:.fr-h5}
            ### Parfois au travers d’un éditeur de logiciel :

            {:.fr-table}
            | Éditeurs ayant intégré l'API Entreprise                                             |                                          Solution                                                                            |                     Cas d'usage                       |
            | ----------------------------------------------------------------------------------- | :--------------------------------------------------------------------------------------------------------------------------: | :----------------------------------------------------:|
            | **Démarches Simplifiées** <br> Service opéré par l'État (DINUM)                                               | [demarches-simplifiees.fr](www.demarches-simplifiees.fr/){:target="_blank"}                 |        Application en ligne de création de formulaire, prête à l'emploi, et mise à disposition de l'ensemble des organismes publics.      |
            | **Efalia** <br> Entreprise privée                                                   | [efalia.com](https://www.efalia.com/) <br> [Solution 6Tzen](https://www.6tzen.fr/){:target="_blank"}                 |                   Portail gestion relation usager       |
            | **Entr’ouvert** <br> Coopérative                                                    | [entrouvert.com](https://www.entrouvert.com) <br> [Publik](https://publik.entrouvert.com/){:target="_blank"}                 |                   Portail de démarches en ligne       |
            | **Lanteas** <br> Entreprise privée                                                    |    [OpenGRU](https://lanteas.com/gestion-relation-usager-open-gru-crm/){:target="_blank"}                     |                  Portail gestion relation usager      |


            _Vous êtes un éditeur proposant une solution de portail de gestion relation usager et ne figurez pas sur cette liste ?_ Veuillez nous contacter à cette adresse e-mail : [support@entreprise.api.gouv.fr](mailto:support@entreprise.api.gouv.fr).
        legal_context:
          content: |+
            L'utilisation des données est encadrée légalement. Vous devez formuler une demande auprès de l'API Particulier en justifiant du cadre légal de l'utilisation des données :

            - **Cadre légal général** : [Article L114-8 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"} ;
            - **Cadre légal spécifique** : le cadre légal général n'est pas suffisant pour vous habiliter. Il est nécessaire de fournir le contexte spécifique de votre administration qui permettra de justifier les données demandées.
        request_access:
          link_datapass: "<%= datapass_base_url %>/api-entreprise/?demarche=portail_gru"
          content: "**Si vous souhaitez accéder à des données protégées pour aider vos agents à instruire les démarches du portail** ou des dossiers d'aides & subventions, il vous faudra faire des demandes d'habilitation différentes car celle-ci ne vous donne accès qu'à de la donnée publique.

            Afin d'accéder aux formulaires spécifiques, consultez la fiche pratique du [cas d'usage portail GRU - Instruction des démarches](<%= cas_usage_path(uid: 'portail_gru_instruction') %>) et du [cas d'usage aides et subventions publiques](<%= cas_usage_path(uid: 'aide_publiques') %>)."

      portail_gru_instruction:
        name: 'Portail GRU - Instruction des démarches'
        user_types:
