---
fr:
  api_entreprise:
    cas_usages_entries:
      marches_publics:
        name: 'Marchés publics'aaa
        user_types:
          - administrations
          - collectivités
        endpoints:
          - insee/etablissements
          - infogreffe/rcs/extrait
          - ministere_interieur/rna
          - insee/etablissements_diffusibles
          - insee/siege_social_diffusibles
          - infogreffe/rcs/extrait
          - insee/siege_social
          - ministere_interieur/rna
          - ministere_interieur/documents_associations
          - djepva/associations
          - inpi/rne/actes_bilans
          - fabrique_numerique_ministeres_sociaux/conventions_collectives
          - cma_france/rnm
          - dgfip/chiffres_affaires
          - dgfip/attestations_fiscales
          - dgfip/v3/attestations_fiscales
          - urssaf/attestation_vigilance
          - urssaf/v3/attestation_vigilance
          - msa/conformites_cotisations
        endpoints_optional:
          - infogreffe/mandataires_sociaux
          - insee/adresse_etablissements
          - insee/adresse_etablissements_diffusibles
          - insee/unites_legales
          - insee/unites_legales_diffusibles
          - insee/successions
          - douanes/immatriculation_eori
          - dgfip/liens_capitalistiques
          - agence_bio/certifications_bio
          - ademe/certifications_rge
          - qualibat/v3/certifications_batiment
          - qualibat/certifications_batiment
          - opqibi/qualifications_ingenierie
          - djepva/associations_open_data
          - commission_europeenne/numero_tva
          - gip_mds/effectifs_annuels_unite_legale
          - gip_mds/effectifs_mensuels_etablissement
          - qualifelec/certificats
          - carif_oref/certifications_qualiopi_france_competences
          - cnetp/attestations_cotisations_conges_payes_chomage_intemperies
          - cibtp/attestations_cotisations_conges_payes_chomage_intemperies
          - probtp/conformites_cotisations_retraite
          - fntp/carte_professionnelle_travaux_public
        endpoints_forbidden: 
          - dgfip/liasses_fiscales
          - banque_de_france/bilans
          - inpi/rne/beneficiaires_effectifs
        comments_endpoints:
          "insee/etablissements_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données publiques utiles DC1, DC2, DC4 & DUME** : _raison sociale, forme juridique, catégorie micro/TPE/PME de l'unité légale. Tranche effectif (année N-2 ou N-3), activité principale et date de création de l'établissement et de l'unité légale. Indique aussi si l'unité légale est de l'économie sociale et solidaire (ESS)._<br><br>📝 Utilisable pour du **préremplissage de formulaire** car donnée publique."

          "insee/etablissements": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Données utiles DC1, DC2, DC4 & DUME** : Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des établissements \"en diffusion partielle\".<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

          "infogreffe/mandataires_sociaux": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Utile dans le cadre d'une **vérification d'interdiction de soumissioner** du candidat. Identité précise des mandataires sociaux : _nom, prénom, date de naissance dont le jour, la commun et le pays de naissance_.<br><br>💡 Les mandataires sociaux sont aussi disponibles avec l'API Extrait RCS d'Infogreffe (nom, prénom et mois de naissance uniquement)."

          "infogreffe/rcs/extrait": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données utiles DC1, DC2, DC4 & DUME** : Préremplir presque toutes les informations contenues dans un **Kbis**, telles que _le nom commercial et la dénomination de l'unité légale_. <br>💡 _Suite au [décrêt n° 2021-631 du 21 mai 2021](https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000043523039){:target='_blank'} et tel que codifié à l'[article R2143-9 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000043531856){:target='_blank'}, l'extrait K-bis ne peut plus être demandé à l'entreprise_."

          "insee/unites_legales_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_."

          "insee/unites_legales": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_."

          "insee/siege_social_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données publiques utiles DC1, DC2, DC4 & DUME** : À&nbsp;partir du Siren de l'unité légale, récupérez l'_adresse postale du siège social_.<br><br>📝 Utilisable pour du **préremplissage de formulaire** car donnée publique."

          "insee/siege_social": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Données utiles DC1, DC2, DC4 & DUME** : Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des sièges sociaux \"en diffusion partielle\".<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

          "insee/adresse_etablissements_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_"

          "insee/adresse_etablissements": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_"

          "insee/successions": "<span class='fr-badge fr-badge--sm fr-badge--orange-terre-battue fr-badge--new'>Suivi prestataires</span> Le SIRET de l'établissement titulaire peut évoluer dans le temps, _par exemple lors d'un changement d'adresse_. Cette API permet de retrouver les établissements prédecesseurs et successeurs d'un établissement et précise s'il s'agit d'un changement de siège, et s'il y a continuité économique."

          "djepva/associations": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données utiles DC1, DC2, DC4 & DUME** : Informations d'une association (unité légale et établissement) telles que _l'identité, la forme juridique, la date de création, les activités principales, le régime, les adresses, les agréments, les représentants légaux, les effectifs salariés-bénévoles-volontaires et les adhérents._<br><br><span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif de capacité économique et financière** : Comptes de résultats et financement, comptes du dernier exercice clôt, budget prévisionnel et rapport du commissaire au compte de l'association."

          "djepva/associations_open_data": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données utiles DC1, DC2, DC4 & DUME** : Informations d'une association (unité légale et établissement) en open data et qui peuvent donc être utilisées pour pré-remplir la démarche, sans pré-authentification de l'usager."

          "ministere_interieur/rna": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données utiles DC1, DC2, DC4 & DUME** : Informations d'une association telles que _le nom, l'objet, l'adresse du siège et la date de création._"

          "ministere_interieur/documents_associations": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> Documents d'une association."

          "inpi/rne/beneficiaires_effectifs": "_Donnée sensible non-nécessaire._<br/><br/>Seules les autorités listées dans le [2° de l’article L561-46 du Code monétaire et financier](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000041578272/){:target='_blank'} sont autorisées à accéder aux bénéficiaires effectifs. L’API Entreprise ne délivre des accès à cette API que pour le cas d’usage *Détection de la fraude*."

          "inpi/rne/actes_bilans": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Vérification de capacité économique et financière** : Consulter les actes pour se renseigner sur l'historique des modifications de l'unité légale et vérifier les associés. Consulter les bilans pour vérifier les capitaux propres, chiffre d'affaire et encours."

          "commission_europeenne/numero_tva": "_Uniquement les numéros de TVA français d'une entreprise ayant un Siren._"

          "fabrique_numerique_ministeres_sociaux/conventions_collectives": "<span class='fr-badge fr-badge--sm fr-badge--new fr-badge--purple-glycine'>Sourcing</span> <span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> _Exemple d'usage spécifique_&nbsp;: En temps qu'acheteur public vous souhaitez que le personnel actuellement titulaire du marché soit gardé même si une nouvelle entreprise remporte le marché. Consulter les conventions collective vous permet de **vérifier si la reprise du personnel est obligatoire pour l'entreprise candidate**. Certaines conventions collectives prévoient en effet la reprise du personnel par transfert de contrat."

          "cma_france/rnm": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Données utiles DC1, DC2, DC4 & DUME**: _Dénomination sociale, forme juridique, effectif salarié, date d'immatriculation au RNM, adresse_ d'une entreprise artisanale."

          "gip_mds/effectifs_annuels_unite_legale" : "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Capacité professionnelle** : L'effectif moyen annuel peut-être demandé en vertu de l'[article 3 de l'annexe 9 du Code de la commande publique](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318577/).<br><br>Cette API délivre l'**effectif annuel global** précis de l'année en cours mais ne permet pas d'accéder aux différents types d'effectifs, comme par exemple l'effectif opérationnel vs administratif.<br/><br/>💡 Pour utiliser cette API, l'usage doit être justifié car la donnée est protégée. _La tranche de l'effectif salarié (année N-2 ou N-3) est par ailleurs appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"_."

          "gip_mds/effectifs_mensuels_etablissement" : "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Capacité professionnelle** : L'effectif moyen mensuel d'un établissement peut-être demandé en vertu de l'[article 3 de l'annexe 9 du Code de la commande publique](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318577/).<br><br>Cette API délivre l'**effectif mensuel global** précis de l'année en cours mais ne permet pas d'accéder aux différents types d'effectifs, comme par exemple l'effectif opérationnel vs administratif.<br/><br/>💡 Pour utiliser cette API, l'usage doit être justifié car la donnée est protégée. _La tranche de l'effectif salarié (année N-2 ou N-3) est par ailleurs appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"_."

          "douanes/immatriculation_eori": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> _Exemple d'usage spécifique_&nbsp;: Vérifier l'**immatriculation auprès des douanes** d'un attributaire de marché étranger."

          "dgfip/chiffres_affaires": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif de capacité économique et financière** : Cette API permet d'accéder au _chiffre d'affaires des trois dernières années_, demandables en vertu de l'[article 2 de l'annexe 9 du Code de la commande publique](https://www.legifrance.gouv.fr/jorf/article_jo/JORFARTI000038318581){:target='_blank'}."

          "inpi/comptes_annuels_rncs": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif de capacité économique et financière** : Cette API permet d'accéder aux _comptes annuels_ issus de l'INPI et délivrés au format PDF. Elle peut permettre de vérifier le rapport entre actif et passif, et autres ratios financiers, demandables en vertu de l'[article 2 de l'annexe 9 du Code de la commande publique](https://www.legifrance.gouv.fr/jorf/article_jo/JORFARTI000038318581){:target='_blank'}."

          "banque_de_france/bilans": "_Donnée sensible non-nécessaire._"

          "dgfip/liasses_fiscales": "_Donnée sensible non-nécessaire._"

          "dgfip/liens_capitalistiques": "<span class='fr-badge fr-badge--sm fr-badge--purple-glycine fr-badge--new'>Attribution du marché</span> Vérification **des actionnaires et filiales de l'entreprise**. Utile pour vérifier qui détient au moins 10% du capital du titulaire et aussi obtenir la liste des filiales détenues par le titulaire, également à hauteur de 10% du capital.<br/><br/>_Par exemple, si le cahier des charges précise qu'il ne sera acceptée qu'une seule offre par opérateur économique, l'accès aux liens capitalistiques peut permettre de vérifier si les candidats sont bien des personnes morales distinctes. Dans le cas où des liens étroits pourraient être constatés, l'acteur public pourrait décider, selon le type de marché, de retenir uniquement la dernière offre, ou de considérer les offres comme irrégulières._"

          "dgfip/attestations_fiscales": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité fiscale en vertu de l'[article L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. L'**attestation fiscale** est listée en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme certificat à délivrer."

          "urssaf/attestation_vigilance": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale en vertu de l'[article L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. L'**attestation sociale** est listée en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme certificat à délivrer.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--orange-terre-battue fr-badge--new'>Suivi prestataires</span> **Vérification et mise à jour automatique du document** pour les marchés de plus de 6 mois."

          "msa/conformites_cotisations": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale en vertu de l'[article L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. L'**attestation MSA** est listée en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme certificat à délivrer."

          "probtp/conformites_cotisations_retraite": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale en vertu de l'[article L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. La conformité des cotisations retraite est listée en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme certificat à délivrer.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "fntp/carte_professionnelle_travaux_public": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale, des candidats soumis à cotisations congés payés, en vertu de l'[article  L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. La **carte professionnelle par la FNTP** est délivrée seulement si l'entreprise est à jour de ses cotisations.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Justificatif de qualification professionnelle** : Connaître les capacités techniques et professionnelles d'une entreprise avec les [identités professionnelles de la FNTP](https://www.fntp.fr/outils/carte-professionnelle/integrer-les-ip-dans-les-marches){:target='_blank'}.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "cnetp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale, des candidats rattachés à la Caisse CNETP (travaux publics), en vertu de l'[article  L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. Le **certificat CNETP** est listé en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme preuve à délivrer.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "cibtp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif d'absence de motif d'exclusion** : vérifier la régularité sociale, des candidats rattachés à la Caisse CIBTP (bâtiment), en vertu de l'[article  L2141-2 du Code de la commande publique](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037703593){:target='_blank'}. Le **certificat CNETP** est listé en [annexe 4](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318472){:target='_blank'} comme preuve à délivrer.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP Bâtiments</span>"

          "agence_bio/certifications_bio": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Certificat de qualité** : _Exemple d'usage spécifique : un appel d'offre pour un service de restauration comportant des produits issus de l’agriculture biologique._<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP fournitures et services</span><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>[achats publics durables](https://www.economie.gouv.fr/cedef/achats-publics-durables){:target='_blank'}</span>"

          "ademe/certifications_rge": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Justificatif de qualification professionnelle.**<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>[achats publics durables](https://www.economie.gouv.fr/cedef/achats-publics-durables){:target='_blank'}</span>"

          "qualibat/certifications_batiment": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Justificatif de qualification professionnelle.**<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "qualifelec/certificats": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Capacité professionnelle** : Délivre l'effectif disponible de l'entreprise pour exécuter la qualification concernée. Cet effectif peut-être demandé en vertu de l'[article 3 de l'annexe 9 du Code de la commande publique](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000038318577/){:target='_blank'}.<br><br>Cette API délivre l'**effectif annuel global** précis de l'année en cours mais ne permet pas d'accéder aux différents types d'effectifs, comme par exemple l'effectif opérationnel vs administratif.<br/><br/>**Justificatif de qualification professionnelle.** Le certificat vous permet de connaître la qualification de l'établissement pour les travaux d'énergie et de génie électrique ; de savoir l'effectif du personnel permanent d'execution et d'encadrement ; et de vérifier les assurances décennale et de responsabilité civile.<br/><br/>_Exemples d'usages spécifiques_&nbsp;: Installation de bornes de recharges électriques ; rénovation énergétique des bâtiments publics ; éclairages publics ; sécurité incendie ou intrusion, etc.<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "opqibi/qualifications_ingenierie": "<span class='fr-badge fr-badge--sm fr-badge--new'>Candidature</span> **Justificatif de qualification professionnelle.**<br/><br/><span class='fr-badge fr-badge--sm fr-badge--grey fr'>MP travaux publics</span>"

          "carif_oref/certifications_qualiopi_france_competences": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif de qualification professionnelle.**<br/>Pour accéder aux financements publics ou mutualisés, la certification Qualiopi est obligatoire pour tous les prestataires proposant des actions de formation, d’apprentissage, de bilan de compétences ou de validation des acquis de l’expérience depuis le 1er janvier 2022 et la suite de l'[Article 6 de la « loi Avenir professionnel » du 5/09/2018](https://www.legifrance.gouv.fr/jorf/article_jo/JORFARTI000037367749){:target='_blank'}. La commande publique qui représente une grande part du marché de la formation est concernée par cette obligation.<br/><br/>Cette API permet d'aller plus loin que la seule vérification du certificat, car elle délivre les habilitations France Compétences de l'établissement."
        introduction:
          title: Facilitez la candidature, l’instruction et le suivi des marchés publics !
          content: |
            {:.fr-text--lead}
            Administrations et collectivités, API Entreprise propose l'accès direct aux données entreprises & associations utiles dans le cadre des marchés publics, pour  simplifier les **dépôts de candidature**, faciliter l'**instruction des dossiers** et le **suivi des prestataires**.

        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
            Administrations et collectivités, en intégrant la brique API Entreprise dans votre profil acheteur :

            - 🗄 Vous **accédez facilement aux données publiques et protégées 🔐** de l'Insee, d'Infogreffe, de la DGFIP, de l'Urssaf... ;

            - ⏰ Vous **accélérez le traitement des démarches** car vos agents instructeurs n'ont pas de vérifications supplémentaires à réaliser, **les informations obtenues de l'API Entreprise étant certifiées 🔎** ;

            - 🔄 Vous **suivez facilement vos prestataires**, car la mise à jour des documents, _telle que l'attestation de vigilance_, peut être automatisée ;

            - 🎯 Enfin, vous **participez activement à la simplification des démarches de candidatures aux marchés publics pour les citoyens** en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à une entreprise/association une information qu'elle a déjà donnée ou que l'administration connaît déjà. <br />Vous vous mettez ainsi **en conformité avec la législation** et, plus particulièrement l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.

        use_case_examples:
          title: Exemples d'applications
          anchor: 'use_case_examples'
          content: |+
           {:.fr-h4}
           ### Une entreprise ou une association candidate à un appel d'offre public en ligne connecté à API Entreprise&nbsp;:

            1. **Elle renseigne son identifiant** (SIRET ou RNA) :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API Entreprise est effectué.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/marches-publics-use_cas_example_1a.png') %>){:width="600px"}

            2. **Les informations administratives la concernant sont pré-remplies automatiquement**. Elle les corrige si besoin et poursuit sa démarche :

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : À partir du format structuré (.json) transmis par l'API Entreprise, vous choisissez la façon d'afficher l'information sur votre profil acheteur.
               ⚠️ Seule de la donnée ouverte peut être pré-remplie. Les données protégées ne doivent jamais être accessibles depuis la partie publique de votre logiciel de marchés publics.

               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/marches-publics-use_cas_example_1b.png') %>){:width="600px"}

            3. **Certains documents justificatifs n'ont pas besoin d'être transmis par l'entreprise/association**. Lorsqu'ils sont disponibles sur API Entreprise, ils seront directement mis à disposition de l'instructeur en _backoffice_.

            4. **L'offre est réceptionnée par l'acheteur, toutes les informations et justificatifs sont regroupés dans un même espace** sur le profil acheteur. L'instructeur n'a pas à vérifier l'exactitude des données car elles sont certifiées.
               ![Image de présentation de l'article sur le numéro de TVA intracommunautaire](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/marches-publics-use_cas_example_2.png') %>){:width="600px"}


           {:.fr-h4}
           ### Un exemple avec Audrey, du service achats du département, et Anthony, entrepreneur BTP&nbsp;:

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Audrey, acheteuse pour le département, a publié un appel d'offre pour l'aménagement d'un carrefour routier_. La plateforme d'achats du département est connectée à l'API Entreprise.

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Anthony, dont l'entreprise est qualifiée pour les travaux demandés_, a repéré l'appel d'offre en ligne. Il se rend sur la plateforme d'achats pour déposer son offre. Il entre le numéro de SIRET de son entreprise. En un clic, toutes les informations publiques rattachées à ce SIRET sont alors pré-remplies : son adresse postale, sa catégorie juridique, sonc code APE, etc. ! Anthony donne son accord pour que certains justificatifs soient directement mis à disposition de l'instructeur.

            {:.fr-text--regular.fr-text--alt.fr-text--lg}
            _Depuis le profil acheteur du département, Audrey a accès aux informations de l'entreprise d'Anthony_, ainsi qu'à une liste des justificatifs disponibles et téléchargeables.
            Ces données et documents lui permettront de vérifier les capacités économiques, financières et professionnelles de l'entreprise, ainsi que l'absence de motif d'exclusion ou d'interdiction de soumissionner. Audrey n'aura pas besoin de vérifier l'authenticité des documents API Entreprise, car ceux-ci sont certifiés !
        list_api:
          content: |+
            {:.fr-text--xl}
            Ce tableau dresse la liste des API utiles pour ce cas d'usage. En commentaires, retrouvez les étapes de la commande publique où la donnée est utile, ainsi que les références législatives associées. Utilisez ce tableau pour compléter votre [demande d'habilitation](#request-access).

            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables seront précochées** par défaut dans le formulaire d'accès.
            Les API **️<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> utiles** seront à cocher par vos soins si votre cas d'usage le justifie.
            Les API **<span style="color:#d64d00" class="fr-icon-close-circle-line" aria-hidden="true"></span> injustifiées** ne peuvent être demandées pour ce cas d'usage.


            {:.fr-highlight.fr-highlight--caution}
            Lors de votre demande d'habilitation, **vous vous engagez à ne demander que les données strictement nécessaires** à la réalisation de la démarche administrative. Consulter [nos conditions générales d'utilisation](<%= cgu_path %>){:target="_blank"}.
        users:
