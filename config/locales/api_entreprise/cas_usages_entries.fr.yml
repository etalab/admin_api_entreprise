        introduction:
          title: "Aides publiques : le cas des subventions de fonctionnement des associations"
          content: |+
            {:.fr-text--lead}
            API Entreprise propose aux administrations et collectivités des API utiles dans le cadre du **formulaire unique de demande de subvention des associations**. Les données obtenues permettent de simplifier le dépôt et l'instruction des demandes.
        role:
          title: Une simplification des demandes de subvention des associations
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-h5}
            ## Qu'est qu'une subvention de fonctionnement ?
            On parle de subventions de _fonctionnement_ par opposition aux subventions d'_investissement_. Les subventions de fonctionnement **participent au fonctionnement global de l'association ou aux projets initiés et mis en oeuvre par l'association**.

            La subvention peut être :
            - _**en numéraire**_, c'est-à-dire qu'il s'agit d'une aide financière sous la forme d'un versement de sommes d'argent ;
            - _**en nature**_, c'est-à-dire une aide non-financière qui peut être la mise à disposition de locaux, d'équipements ou même de formation.

            {:.fr-h5}
            ## Un formulaire de demande unique pour les associations

            Depuis le 01 janvier 2017, les demandes de fonctionnement des associations doivent être établies par le biais d'un formulaire unique dont les caractéristiques sont détaillées dans le [décret n° 2016-1971 du 28 décembre 2016](https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000033736810){:target="_blank"}.

            <div class="fr-grid-row fr-grid-row--gutters">
             <div class="fr-col-12 fr-col-md-6">
              <div class="fr-download fr-enlarge-link fr-download--card">
               <p>
                <a href="/files/formulaire-unique-subventions-associations-cerfa_12156-06.pdf" download class="fr-download__link">Télécharger le formulaire unique de demande
                 <span class="fr-download__detail">PDF – 1,3 Mo</span>
                </a>
               </p>
               <p class="fr-download__desc">Cerfa n°12156*06</p>
              </div>
             </div>
            </div>

            {:.fr-h5}
            ## Ce que permet l'API Entreprise

            {:.fr-text--lg}
            Administrations et collectivités, en intégrant la brique API Entreprise dans votre portail d'aides et votre système d'information&nbsp;:

            - 🗄 Vous **accédez facilement aux données publiques et protégées 🔐** du ministère de l'Intérieur sur les associations, données déjà mises à disposition par les associations dans [Le compte Asso](https://lecompteasso.associations.gouv.fr){:target="_blank"}. Vous avez également un accès privilégié à d'autres informations telles que les données du répertoire Sirene, ou de l'Agence Bio ;

            - 🎢 Vous **augmentez le pourcentage des démarches finalisées** car vous faîtes gagner du temps à l'usager lors de sa saisie du [formulaire unique de demande de subventions - Cerfa n° 12156*06](https://www.service-public.fr/particuliers/vosdroits/R1271){:target="_blank"} ;

            - 🎯 Enfin, vous **participez activement à la simplification des demandes de subventions**, en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à une association une information qu'elle a déjà donnée.<br />Vous vous mettez ainsi **en conformité avec la législation** et, plus particulièrement l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.

            Votre service propose d'autres types d'aides ? concerne aussi les entreprises ? Consultez la fiche pratique du [cas d'usage des aides publiques](<%= cas_usage_path(uid: 'aides_publiques') %>).
        use_case_examples:
          title: null
          anchor: null
          content: null
        list_api:
          content: |+
            {:.fr-text--xl}
            Ce tableau dresse la liste des API utiles pour compléter le [formulaire unique de demande de subventions](https://www.associations.gouv.fr/le-formulaire-unique-de-demande-de-subvention-est-en-ligne.html){:target="_blank"} dont le contenu est détaillé dans le [décrêt n° 2016-1971 du 28 décembre 2016](https://www.legifrance.gouv.fr/loda/id/JORFTEXT000033736810/2022-01-02){:target="_blank"}. <br>Utilisez le tableau pour compléter votre [demande d'habilitation](#request-access).

            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables**.
            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> qui peuvent être utiles**.
            Les API **<span style="color:#d64d00" class="fr-icon-close-circle-line" aria-hidden="true"></span> injustifiées ou inutiles** pour ce cas d'usage.
        users:
          title: Ils utilisent l’API Entreprise
          anchor: 'users'
          content: |+
            Retrouvez les différentes organisations publiques utilisant l'API Entreprise pour délivrer des aides et subventions depuis le [cas d'usage général des aides publiques](<%= cas_usage_path(uid: 'aides_publiques') %>).
        legal_context:
          content: |+
            L'utilisation des données est encadrée légalement. Vous devez formuler une demande auprès de l'API Particulier en justifiant du cadre légal de l'utilisation des données :

            - **Cadre légal général** : [Article L114-8 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"} ;
            - **Cadre légal spécifique** : le cadre légal général n'est pas suffisant pour vous habiliter. Il est nécessaire de fournir le contexte spécifique de votre administration qui permettra de justifier les données demandées.
        request_access:
          link_datapass: "<%= datapass_base_url %>/api-entreprise?demarche=aides_publiques"
          content: |+
            ⬆️ Cette demande d'accès à l'API Entreprise a été conçue pour les aides et subventions des associations et des entreprises. Si votre service s'adresse uniquement aux associations, il vous faudra décocher les API qui ne délivrent pas de données associations :

            {:.fr-highlight.fr-highlight--caution}
            Lors de votre demande d'habilitation, **vous vous engagez à ne demander que les données strictement nécessaires** à la réalisation de la démarche administrative. Consulter [nos conditions générales d'utilisation](<%= cgu_path %>){:target="_blank"}.

            Pour vous aider, référez-vous à la [liste des API ci-dessus](#list-api).

