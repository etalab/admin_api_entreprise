        comments_endpoints:
            "insee/etablissements_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> _raison sociale, forme juridique, catégorie micro/TPE/PME de l'unité légale. Tranche effectif (année N-2 ou N-3), activité principale et date de création de l'établissement et de l'unité légale. Indique aussi si l'unité légale est de l'économie sociale et solidaire (ESS)._<br><br>📝 Utilisable pour du **préremplissage de formulaire** car donnée publique."

            "insee/etablissements": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des établissements \"en diffusion partielle\".<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

            "infogreffe/mandataires_sociaux": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Identité précise des mandataires sociaux : _nom, prénom, date de naissance dont le jour, la commun et le pays de naissance_.<br><br>💡 Le mandataires sociaux sont aussi disponibles avec l'API Extrait RCS d'Infogreffe (nom, prénom et mois de naissance uniquement)."

            "infogreffe/rcs/extrait": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> Préremplir presque toutes les informations contenues dans un **Kbis**, telles que _le nom commercial et la dénomination de l'unité légale._<br><br>💡 _Depuis le 23 novembre 2021, l'extrait K-bis ne peut plus être demandé à l'entreprise. [Consulter le décrêt](https://www.legifrance.gouv.fr/jorf/id/JORFTEXT000043523039){:target='_blank'}_"

            "insee/unites_legales_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_."

            "insee/unites_legales": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_."

            "insee/siege_social_diffusibles": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> À&nbsp;partir du Siren de l'unité légale, récupérez l'_adresse postale du siège social._<br><br>📝 Utilisable pour du **préremplissage de formulaire** car donnée publique."

            "insee/siege_social": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Mêmes données que l'API ci-dessus ⬆️ avec en plus les informations protégées des établissements \"en diffusion partielle\".<br><br>🔐 Uniquement utilisable en **backoffice par l'instructeur** car donnée protégée."

            "insee/adresse_etablissements_diffusibles": "💡_Ces données sont aussi distribuées par l'API \"Données établissement en open data\"_"

            "insee/adresse_etablissements": "💡_Ces données sont aussi distribuées par l'API \"Données établissement\"_"

            "insee/successions": "<span class='fr-badge fr-badge--sm fr-badge--purple-glycine fr-badge--new'>Suivi</span> Le SIRET de l'établissement bénéficiaire peut évoluer dans le temps, _par exemple lors d'un changement d'adresse_. Cette API permet de retrouver les établissements prédecesseurs et successeurs d'un établissement et précise s'il s'agit d'un changement de siège, et s'il y a continuité économique."

            "djepva/associations": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Informations d'une association** (unité légale et établissement) telles que _l'identité, la forme juridique, la date de création, les activités principales, le régime, les adresses, les agréments, les représentants légaux, les effectifs salariés-bénévoles-volontaires et les adhérents._<br><br>**Données utiles [compte-rendu financier](https://www.service-public.fr/particuliers/vosdroits/R46623){:target='_blank'}** : Comptes de résultats et financement, comptes du dernier exercice clôt, budget prévisionnel et rapport du commissaire au compte de l'association."

            "djepva/associations_open_data": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> **Informations d'une association** (unité légale et établissement) **en open data** et qui peuvent donc être utilisées pour pré-remplir la démarche, sans pré-authentification de l'usager."

            "ministere_interieur/rna": ""

            "ministere_interieur/documents_associations": ""

            "inpi/rne/beneficiaires_effectifs": "_Donnée sensible non-nécessaire._<br/><br/>Seules les autorités listées dans le [2° de l’article L561-46 du Code monétaire et financier](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000041578272/){:target='_blank'} sont autorisées à accéder aux bénéficiaires effectifs. L’API Entreprise ne délivre des accès à cette API que pour le cas d’usage *Détection de la fraude*."

            "inpi/rne/actes_bilans": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Vérification de capacité économique et financière** : Consulter les actes pour se renseigner sur l'historique des modifications de l'unité légale et vérifier les associés. Consulter les bilans pour vérifier les capitaux propres, chiffre d'affaire et encours."

            "commission_europeenne/numero_tva": "_Uniquement les numéros de TVA français d'une entreprise ayant un Siren._"

            "fabrique_numerique_ministeres_sociaux/conventions_collectives": ""

            "cma_france/rnm": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> _Dénomination sociale, forme juridique, effectif salarié, date d'immatriculation au RNM, adresse_ d'une entreprise artisanale."

            "gip_mds/effectifs_annuels_unite_legale" : "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Connaître l'effectif annuel exact de l'entreprise ou de l'association pour déterminer les aides éligibles.<br/><br/>💡La tranche de l'effectif salarié (année N-2 ou N-3) est appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"."

            "gip_mds/effectifs_mensuels_etablissement" : "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Connaître l'effectif mensuel exact de l'entreprise ou de l'association pour déterminer les aides éligibles.<br/><br/>💡La tranche de l'effectif salarié (année N-2 ou N-3) est appelable avec l'API \"Données établissements - Insee\", et l'effectif d'une entreprise artisanale avec l'API \"Données du RNM - CMA\"."

            "douanes/immatriculation_eori": ""

            "dgfip/chiffres_affaires": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Identifier directement le montant d'une aide, si celle-ci est déterminée par le chiffre d'affaires."

            "inpi/comptes_annuels_rncs": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Récupérer les comptes annuels de l'entreprise ou de l'association."

            "banque_de_france/bilans": "_Donnée sensible non-nécessaire._"

            "dgfip/liasses_fiscales": "_Donnée sensible non-nécessaire._"

            "dgfip/liens_capitalistiques": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérification des **actionnaires et filiales de l'entreprise**. Utile pour vérifier qui détient au moins 10% du capital du titulaire et aussi obtenir la liste des filiales détenues par le titulaire, également à hauteur de 10% du capital.<br/><br/> _Par exemple, peut-être utile pour s'assurer que les règles de cumul et de plafonds des aides par entreprise sont bien respectées et ne sont pas camouflées par un montage de plusieurs entreprises différentes._"

            "dgfip/attestations_fiscales": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité fiscale de l'entreprise en récupérant l'**attestation fiscale**. <br><br>Le cas d'utilisation de cette attestation pour les aides et subventions publiques est mentionné dans le BOFIP, [alinéa 70 du BOI-DJC-ARF](https://bofip.impots.gouv.fr/bofip/8485-PGP.html/identifiant=BOI-DJC-ARF-20220209#Cas_dutilisation_23){:target='_blank'}."

            "urssaf/attestation_vigilance": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale en récupérant l'**attestation sociale**."

            "msa/conformites_cotisations": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale d'une entreprise du régime agricole devant verser ses **cotisations auprès de la MSA**."

            "probtp/conformites_cotisations_retraite": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale d'une entreprise du BTP."

            "fntp/carte_professionnelle_travaux_public": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale d'une entreprise du BTP."

            "cnetp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale, des entreprises de travaux publics versant leurs cotisations congés payés à la Caisse CNETP."

            "cibtp/attestations_cotisations_conges_payes_chomage_intemperies": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Vérifier la régularité sociale, des entreprises du bâtiment versant leurs cotisations congés payés à la Caisse CIBTP."

            "agence_bio/certifications_bio": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> Utile pour vérifier les certifications en BIO d'une entreprise qui dépose une demande d'aide ou appel à projet valorisant la filière BIO. [Exemples d'aides sur critères BIO](https://www.agencebio.org/vos-outils/fonds-avenir-bio/les-aides-a-linvestissement/){:target='_blank'}."

            "ademe/certifications_rge": "<span class='fr-badge fr-badge--sm fr-badge--new'>Préremplissage</span> <span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> _Exemple spécifique :_ Dans le cadre d'aides à la réhabilitation de logement ancien, cette API permet de vérifier que l'entreprise est bien RGE."

            "qualibat/certifications_batiment": "Qualifications d’une entreprise dans le bâtiment."

            "qualifelec/certificats": "Qualifications d'une entreprise dans le génie électrique et énergétique."

            "opqibi/qualifications_ingenierie": "Différentes qualifications d'ingénierie d'une unité légale."

            "carif_oref/certifications_qualiopi_france_competences": "<span class='fr-badge fr-badge--sm fr-badge--green-archipel fr-badge--new'>Instruction</span> **Justificatif de qualification professionnelle.**<br/>Pour accéder aux financements publics ou mutualisés, la certification Qualiopi est obligatoire pour tous les prestataires proposant des actions de formation, d’apprentissage, de bilan de compétences ou de validation des acquis de l’expérience depuis le 1er janvier 2022 et la suite de l'[Article 6 de la « loi Avenir professionnel » du 5/09/2018](https://www.legifrance.gouv.fr/jorf/article_jo/JORFARTI000037367749){:target='_blank'}.<br/><br/>Cette API permet d'aller plus loin que la seule vérification du certificat, car elle délivre les habilitations France Compétences de l'établissement."
        introduction:
          title: Faciliter le dépôt et l'instruction des aides publiques
          content: |
            {:.fr-text--lead}
            API Entreprise propose aux administrations et collectivités des API utiles dans le cadre de la délivrance de subventions, d'aides publiques et de fonds européens. Les données obtenues permettent de simplifier le **dépôt des demandes** et de faciliter l’**instruction des dossiers**.
        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
            Administrations et collectivités, en intégrant la brique API Entreprise dans votre portail d'aides et votre système d'information&nbsp;:

            - 🗄 Vous **accédez facilement aux données publiques et protégées 🔐** de l'Insee, d'Infogreffe, de la DGFIP, de l'Urssaf... ;

            - ⏰ Vous **accélérez le traitement des demandes d'aides des associations et des entreprises** car vos agents instructeurs n'ont pas de vérifications supplémentaires à réaliser, **les informations obtenues de l'API Entreprise étant certifiées 🔎** ;

            - 🎢 Vous **augmentez le pourcentage des démarches finalisées** car vous faîtes gagner du temps à l'usager ;

            - 🎯 Enfin, vous **participez activement à la simplification des demandes d'aides** en mettant en place le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"} : vous ne demandez plus à à une entreprise/association une information qu'elle a déjà donnée ou que l'administration connaît déjà. <br />Vous vous mettez ainsi **en conformité avec la législation** et, plus particulièrement l'[Article L113-12 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000037313155){:target="_blank"}.
        use_case_examples:
          title: null
          anchor: null
          content: null
        list_api:
          content: |+
            {:.fr-text--xl}
            Ce tableau dresse la liste des API utiles pour ce cas d'usage. Utilisez-le pour compléter votre [demande d'habilitation](#request-access).

            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables seront précochées** par défaut dans le formulaire d'accès.
            Les API **️<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> utiles** seront à cocher par vos soins si votre cas d'usage le justifie.
            Les API **<span style="color:#d64d00" class="fr-icon-close-circle-line" aria-hidden="true"></span> injustifiées** ne peuvent être demandées pour ce cas d'usage.

            {:.fr-highlight.fr-highlight--caution}
            Lors de votre demande d'habilitation, **vous vous engagez à ne demander que les données strictement nécessaires** à la réalisation de la démarche administrative. Consulter [nos conditions générales d'utilisation](<%= cgu_path %>){:target="_blank"}.

            **🔎 Zoom sur les subventions de fonctionnement des associations** : [consultez la fiche pratique](<%= cas_usage_path(uid: 'subventions_associations') %>) pour connaître les données utiles.
        users:
          title: Ils utilisent l’API Entreprise
          anchor: 'users'
          content: |+
            {:.fr-h5}
            ### Des communes et intercommunalités
            Alsace collectivité européenne, Corbas, Les Sables-D’olonne, Saint Chamond, Venissieux, Communauté d’agglomération Chauny-Tergnier-La Fère, Communauté urbaine d’Arras, Grand Poitiers communauté urbaine.

            <figure class="fr-quote--column ">
            {:.fr-quote}
            >
            > <blockquote>«&nbsp;La ville attribue des subventions aux associations de son territoire [...], elle a mis en oeuvre un portail de gestion de la relation citoyen dédié au suivi de la relation avec ses associations. Pour s'enregistrer sur ce portail, puis pour pouvoir solliciter une aide de la collectivité, l'association doit justifier de son immatriculation et de l'identité de ses représentants légaux. Le logiciel permet d'interroger l'API&nbsp;Entreprise pour renseigner ces différentes informations par défaut.&nbsp;»
            > </blockquote>
            >
            > <figcaption>
            > Commune de Vénissieux
            > {:.fr-quote__author}
            >
            > [Site des démarches de Vénissieux](https://demarches.venissieux.fr/){:target="_blank"}
            > {:.fr-quote__source}
            >
            > {:.fr-quote__image}
            >  ![Logo de la ville de Vénissieux](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/users_logo_venissieux.png') %>){:width="100px"}
            > </figcaption>
            >
            </figure>

            {:.fr-h5}
            ### Des métropoles
            Grenoble-Alpes-Métropole, Grand Lyon.

            {:.fr-h5}
            ### Des départements
            Drôme, Finistère, Isère, Vaucluse.

            {:.fr-h5}
            ### Des régions
            Bourgogne-Franche-Comte, Bretagne, Centre-Val de Loire, Île-de-France, Normandie, Nouvelle-Aquitaine, Réunion.


            <figure class="fr-quote--column ">
            {:.fr-quote}
            >
            > <blockquote>«&nbsp;L'aide "chèque numérique" utilise l'API Entreprise pour simplifier la démarche de demande pour les usagers, et faciliter les opérations d'instruction pour les agents de la Région. L'accès à l'API Entreprise nous permet de faire des contrôles lors de la création de la demande par l'usager (_existence SIREN/SIRET, récupération d'adresse, etc._) et permet d'afficher à nos agents des aides à l'instruction. Par exemple,  les différences entre les données fournies par l'usager et les données remontées par l'API : _code NAF, dénomination, taille de l'entreprise, etc._&nbsp;»
            > </blockquote>
            >
            > <figcaption>
            > Région Réunion
            > {:.fr-quote__author}
            >
            > [Site des démarches de la région Réunion](https://demarches.cr-reunion.fr){:target="_blank"}
            > {:.fr-quote__source}
            >
            > {:.fr-quote__image}
            >  ![Logo de la région Réunion](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/users_logo_region-reunion.png') %>){:width="100px"}
            > </figcaption>
            >
            </figure>

            <!--
            <figure class="fr-quote--column ">
            {:.fr-quote}
            >
            > <blockquote>«&nbsp;Pour faciliter le dépôt des demandes de subventions régionales et européennes, et leur instruction, nous proposons au bénéficiaire de saisir son SIRET et d'interroger les API Insee de l'API Entreprise.
            Ensuite, en _backoffice_, si le bénéficiaire a donné son accord, l'instructeur peut récupérer les différentes attestations de manière automatique. Les données d'attestation fiscale, sociale et de déclaration de résultat sont utilisées pour les aides européennes.&nbsp;»
            > </blockquote>
            >
            > <figcaption>
            > Région Nouvelle-Aquitaine
            > {:.fr-quote__author}
            >
            > [Site des démarches de la région Nouvelle-Aquitaine](https://www.europe-en-nouvelle-aquitaine.eu/fr/le-depot-et-le-suivi-de-mon-dossier.html){:target="_blank"}
            > {:.fr-quote__source}
            >
            > {:.fr-quote__image}
            >  ![Logo de la région Nouvelle-Aquitaine](<%= image_path('api_entreprise/cas_usages/pictos/use_case_examples/users_logo_region-nouvelle-aquitaine.png') %>){:width="100px"}
            > </figcaption>
            >
            </figure>
            -->

            {:.fr-h5}
            ### Des administrations

            Agence nationale de cohésion des territoires (ANCT), système d'information [Synergie](https://www.europe-en-france.gouv.fr/fr/synergie-loutil-partage-de-suivi-et-de-gestion-des-fonds-europeens){:target="_blank"}.

            {:.fr-h5}
            ### Parfois au travers d’un éditeur de logiciel :

            {:.fr-table}
            | Éditeurs ayant intégré l'API Entreprise                                             |                                          Solution                                                                            |                     Cas d'usage                       |
            | ----------------------------------------------------------------------------------- | :--------------------------------------------------------------------------------------------------------------------------: | :----------------------------------------------------:|
            | **Atexo** <br> Entreprise privée                                                    | [Local Trust Sub](https://www.atexo.com/solutions/solutions-subventions-et-aides-individuelles/){:target="_blank"}           |   Aides & subventions publiques                    |
            | **Axyus** <br> Entreprise privée                                                    |                             [Axyus](https://www.axyus.com/){:target="_blank"}                                                |                   Aides & subventions publiques      |
            | **Efalia** <br> Entreprise privée                                                   | [efalia.com](https://www.efalia.com/) <br> [Solution 6Tzen](https://www.6tzen.fr/){:target="_blank"}                 |                   Portail gestion relation usager       |
            | **Entr’ouvert** <br> Coopérative                                                    | [entrouvert.com](https://www.entrouvert.com) <br> [Publik](https://publik.entrouvert.com/){:target="_blank"}                 |                   Portail de démarches en ligne       |
            | **MGDIS** <br> Entreprise privée                                                    |    [Portail des aides](https://www.mgdis.fr/nos-solutions/pilotage-des-aides-versees/){:target="_blank"}                     |                  Aides & subventions publiques      |
            | **Lanteas** <br> Entreprise privée                                                    |    [OpenSub](https://lanteas.com/opensub-solution-innovante-de-gestion-des-subventions/){:target="_blank"}            |                  Aides & subventions publiques      |
            | **Smart Public** <br> Entreprise privée                                  |                       [Smart Public](https://www.smartpublic.fr/){:target="_blank"} |           Logiciel de pilotage         |

            _Vous êtes un éditeur proposant une solution pour les aides et subventions publiques et ne figurez pas sur cette liste ?_ Veuillez nous contacter à cette adresse e-mail : [support@entreprise.api.gouv.fr](mailto:support@entreprise.api.gouv.fr).
        legal_context:
          content: |+
            L'utilisation des données est encadrée légalement. Vous devez formuler une demande auprès de l'API Particulier en justifiant du cadre légal de l'utilisation des données :

            - **Cadre légal général** : [Article L114-8 du Code des relations entre le public et l'administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"} ;
            - **Cadre légal spécifique** : le cadre légal général n'est pas suffisant pour vous habiliter. Il est nécessaire de fournir le contexte spécifique de votre administration qui permettra de justifier les données demandées.
