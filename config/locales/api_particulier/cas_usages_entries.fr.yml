            {:.fr-h5}
            ### Un usager demandeur d'emploi souhaite obtenir un titre de transport&nbsp;:

            1. **Étape 1&nbsp;:** L'usager se connecte à son espace personnel, via FranceConnect, sur le site de la démarche en ligne. Son statut de demandeur d'emploi est automatiquement reconnu.&nbsp;:

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API statut demandeur d'emploi du bouquet API Particulier est effectué et permet de confirmer le statut.

            2. **Étape 2&nbsp;:** La réduction est automatiquement attribuée. L'usager n'a plus qu'à régler son titre.
            Selon la tarification appliquée, différentes API peuvent être utiles et sont détaillées ci-après.

