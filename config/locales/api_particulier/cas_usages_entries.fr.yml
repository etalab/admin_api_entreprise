        introduction:
          title: Simplifiez la tarification des services municipaux à l'enfance pour les familles
          content: |
            {:.fr-text--lead}
            Communes et intercommunalités, avec API Particulier, accédez directement au quotient familial CAF/MSA et à la situation des familles pour calculer leur tarif de restauration scolaire, de crèches ou d'activités périscolaires ou municipales.

             <span class="fr-accordion__title">
                <button class="fr-accordion__btn" aria-expanded="false" aria-controls="accordion-106"><span class="fr-icon-questionnaire-fill fr-mr-1w" aria-hidden="true"></span>Qu'est-ce que la tarification des services municipaux à l'enfance ?</button>
            </span>
            <div class="fr-collapse" id="accordion-106">
              <p>
                Les communes et intercommunalités ont pour compétences l'attribution et la tarification de différents services : la crèche, l'halte-garderie, les centres de loisirs, la restauration scolaire, les goûters, les études, le conservatoire, l'atelier beaux-arts etc..
              </p>
              <p>
                De nombreuses communes permettent aux habitants d'accéder à ces services directement depuis un portail, souvent appelé "Portail familles", pour gérer l'inscription et la facturation des services proposés. Ce type de portail permet généralement de réserver et payer en ligne les factures liées aux activités péri- et extra-scolaires, de suivre les paiements et de gérer les informations liées au compte de la famille. La tarification de ces activités est adaptée aux ressources de la famille.
              </p>
              <p>
                D'autres communes utilisent des logiciels de gestion en back-office.
              </p>
              <p>
              Selon la politique tarifaire choisie, le calcul des tarifs est réalisé grâce au quotient familial de la Caisse d’allocations familiales (CAF) ou de la sécurité sociale agricole (MSA) et/ou du revenu fiscal de référence figurant sur l'avis d'imposition du foyer. L'API Particulier permet d'accéder facilement au quotient familial de la CAF et de la MSA.
              </p>   
            </div>
        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
              Communes et intercommunalités, en intégrant la brique API Particulier dans votre système d'information&nbsp;:

              - 😃 **Pour instruire les dossiers, il n'est plus nécessaire de collecter auprès des familles** l'attestation quotient familial de la CAF ou de la MSA.

              - ⏰ **Vous accélérez ou même automatisez l'instruction** car vos agents instructeurs n'ont plus à vérifier les pièces justificatives fournies, les informations obtenues de l'API Particulier étant certifiées 🔎 ;

              - 🎢 **Vous augmentez le pourcentage des démarches finalisées** car vous faîtes gagner du temps à l'usager ;

              - 🎯 **Enfin, vous participez à la simplification des démarches pour les citoyens** en mettant en oeuvre le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"}, en application de l'[article L114-8 du Code des relations entre le public et l’administration](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"}.

              {:.fr-highlight}
              > **Votre tarification sociale est également calculée à partir du revenu fiscal de référence ?**
              > L'API Particulier ne propose pas cette donnée. Vous pouvez demander l'accès à l'[API Impôt Particulier](https://api.gouv.fr/les-api/impot-particulier){:target="_blank"} pour récupérer le revenu fiscal de référence de la famille.
              > ⚠️ **Les données de l’API Impôt particulier ne permettent pas de calculer les tarifs en établissement d'accueil du jeune enfant** (crèche, multi-accueil, halte-garderie…). Elles ne doivent donc pas être utilisées pour le calcul des participations familiales en Eaje. Une API spécifique est en cours de préparation.

              {:.fr-highlight}
              > **Vous cherchez à simplifier la tarification des collèges ou lycées ?** Veuillez consulter le cas d'usage [Tarification cantines des collèges et lycées](<%= cas_usages_path('cantines-colleges-lycees-tarification') %>).
        use_case_examples:
          title: Exemples d'applications
          anchor: 'use_case_examples'
          content: |+
            {:.fr-h5} 
            ### Parcours de Camille et Kevin sur le démonstrateur API Particulier&nbsp;:

            <button class="fr-btn fr-btn--icon-right fr-icon-arrow-right-line" href="https://demonstrateur.particulier.api.gouv.fr/cantine/choix-personnage">
                Commencer la démo
            </button>


            {:.fr-h5}
            ### Un parent souhaite inscrire son enfant à la crèche, sur le portail famille de sa commune connecté à l'API Particulier&nbsp;:

            1. **Étape 1&nbsp;:** Le parent se connecte à son espace personnel sur le site de la région, il clique sur la démarche dédiée à l'inscription crèche, il s'identifie via FranceConnect ou en renseignant ses données d'identité _nom de naissance, prénom, sexe, lieu et date de naissance_&nbsp;:

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API quotient familial CAF du bouquet API Particulier est effectué et permet de récupérer le quotient familial du mois en cours ou choisi.

            2. **Étape 2&nbsp;:** Le parent est automatiquement positionné dans la grille tarifaire de la collectivité. Le parent n'a plus qu'à terminer l'envoi de sa demande d'inscription.

            {:.fr-h5}
            ### Un parent souhaite inscire son enfant à la cantine de l'école, sa commune est connectée à l'API Particulier via un back-office et va traiter son dossier&nbsp;:

            1. **Étape 1&nbsp;:** L'école envoie un e-mail aux parents pour leurs demander de transmettre leur quotient familial CAF ou MSA via le [formulaire de collecte](<=% cas_usage_path('formulaire_qf') %>). _Une alternative sur place à l'école ou par e-mail est proposée car ce formulaire est disponible uniquement via FranceConnect_.

            2. **Étape 3&nbsp;:** Le parent se rend sur [Quotient-familial.numerique.gouv.fr](<=% cas_usage_path('formulaire_qf') %>). Il se FranceConnecte, ses données d'identité et son quotient familial récupérés grâce à FranceConnect et API Particulier sont affichés. Il valide pour envoyer ces informations à la commune.

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Un appel à l'API quotient familial CAF du bouquet API Particulier est effectué au moment de la FranceConnexion du parent. Les données sont stockées dans Hubee le temps que l'éditeur de la commune les récupère et les affiche dans le back-office de la commune

            2. **Étape 4&nbsp;:**Le logiciel de la commune reçoit les informations, et calcule automatiquement le tarif de la cantine. L'envoi de ce tarif est directement transmis à l'école.&nbsp;:

               {:.fr-highlight.fr-highlight--example}
               ⚙️ **En arrière-plan** : Cette étape est réalisée par le logiciel de la commune et plus ou moins automatisée. Les données peuvent aussi être traitées par un agent.

            2. **Étape 3&nbsp;:** Le parent reçoit un e-mail de confirmation de l'école avec le tarif de la cantine. Il n'a plus qu'à payer.
        list_api:
          content: |+
            Les API **<span style="color:#1f8d49" class="fr-icon-checkbox-circle-fill" aria-hidden="true"></span> indispensables seront précochées** par défaut dans le formulaire d'accès.
            Les API **️<span style="color:#1f8d49" class="fr-icon-checkbox-circle-line" aria-hidden="true"></span> utiles** seront à cocher par vos soins si votre cas d'usage le justifie.
