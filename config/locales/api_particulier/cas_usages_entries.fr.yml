          content: |
            {:.fr-text--lead}
            Départements et régions, API Particulier permet d'accéder directement au quotient familial CAF/MSA des familles.
            
            <span class="fr-accordion__title">
                <button class="fr-accordion__btn" aria-expanded="false" aria-controls="accordion-106"><span class="fr-icon-questionnaire-fill fr-mr-1w" aria-hidden="true"></span>Comment fonctionne la tarification des cantines dans les collèges et lycée ?</button>
            </span>
            <div class="fr-collapse" id="accordion-106">
              <p>Les départements sont en charge des cantines des collèges, et les régions, des cantines des lycées. Dans ce cadre, ce sont ces collectivités qui fixent les tarifs de la restauration scolaire et qui peuvent décider d'appliquer une tarification sociale sur la base des revenus de la famille.
              <br/>
              Pour en savoir plus, consulter cette page de <a href="https://www.service-public.fr/particuliers/vosdroits/F24569">Service-Public.fr</a>
              </p>   
