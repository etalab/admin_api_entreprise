            {:.fr-h3}
            ## <a name="1-formulaire-usager"></a>Un formulaire usager pour faciliter l'appel à l'API

            {:.fr-text--lg}
            API Particulier propose une solution pour collecter le quotient familial des usagers et leur identité pivot, via FranceConnect. Cette solution est composée de deux éléments&nbsp;:  
            - Un formulaire à destination des usagers est disponible sur _[quotient-familial.numerique.gouv.fr](https://quotient-familial.numerique.gouv.fr){:target="_blank"}_ ;
            - Un espace de stockage temporaire de la donnée, sur [Hubee](https://www.hubee.numerique.gouv.fr/){:target="_blank"}, permettant aux collectivités de récupérer les informations collectées. 

            {:.fr-text--lg}
            Cette solution interroge l'[API quotient familial MSA & CAF](<%= endpoint_path(uid: 'cnav/quotient_familial_v2') %>) et FranceConnect pour récupérer les informations de l'usager, à savoir son identité pivot, celles des membres de sa famille et son quotient familial. La collectivité pourra ensuite utiliser l'identité pivot pour mettre à jour les quotients familiaux. 

            La collecte des informations par la collectivité peut être effecutée de deux manières différentes&nbsp;:
            - 
            Cette solution permet ainsi à la collectvité d'interroger l'[API quotient familial MSA & CAF](<%= endpoint_path(uid: 'cnav/quotient_familial_v2') %>) avec une identité pivot vérifiée, sans avoir à intégrer tout de suite la [modalité d'appel FranceConnect](<%= cas_usages_path(anchor: 'modalite-appel-franceconnect') %>).



