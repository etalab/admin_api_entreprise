        role:
          title: Une simplification des démarches
          anchor: 'simplification-des-demarches'
          content: |+
            {:.fr-text--lg}
              Autorités organisatrices de mobilité (AOM), en intégrant la brique API Particulier dans vos formulaires en ligne et votre système d'information&nbsp;:

              - 🗄 **Vous accédez facilement aux données des particuliers issues de différentes administrations** telles que France travail, les ministères de l'éducation nationale et l'enseignement supérieur, le Cnous, la CAF, la MSA... ;

              - 😃 **Pour mettre en oeuvre une tarification sociale**, il n'est plus nécessaire de collecter :
                - le statut demandeur d'emploi ;
                - le certificat de scolarité collège/lycée et le statut élève boursier ;
                - le certificat de scolarité étudiant et le statut étudiant boursier ;
                - le statut bénéficiaire de différentes prestation : allocation adulte handicapé (AAH), prime d'activité, allocation de soutien familial, complémentaire santé solidaire avec ou sans participation.

              - 😃 **Pour mettre en oeuvre une tarification solidaire**, il n'est plus nécessaire de collecter le quotient familial CAF & MSA.

              - ⏰ **Vous dématérialisez totalement votre service en ligne** car vos agents instructeurs n'ont plus à vérifier les pièces justificatives fournies, les informations obtenues de l'API Particulier étant certifiées 🔎 ;

              - 👨‍💼 **Une utilisation logicielle au guichet est aussi possible**, tout en évitant le stock des pièces justificatives, les erreurs de saisie et les fraudes.

              - 🎢 **Vous augmentez le pourcentage des démarches finalisées** et participez ainsi à la réduction du non-recours aux aides car vous faîtes gagner du temps à l'usager ;

              - 🎯 **Enfin, vous participez à la simplification des démarches pour les citoyens** en mettant en oeuvre le [«&nbsp;Dites-le-nous une fois&nbsp;»](https://www.numerique.gouv.fr/services/guichet-dites-le-nous-une-fois/){:target="_blank"}, en application de l'[article L114-8 du Code des relations entre le public et l’administration.](https://www.legifrance.gouv.fr/codes/article_lc/LEGIARTI000045213315){:target="_blank"}.
