          title: Durée de validité du lien
          description: Cette page contient votre jeton d'accès à API Particulier et ne doit en aucun cas être partagée avec un tiers non habilité ! Ce lien expirera dans %{expiration_time}.
    api_particulier:
      header:
        title: API Particulier
        tagline: Les données des particuliers <strong>pour les administrations</strong>
        tools:
          links:
            faq_contact:
              title: "FAQ & Contact"
              icon: "question-fill"
            sign_in:
              title: "Se connecter"
              icon: "lock-fill"
            user_connected:
              icon: "user-fill"
            sign_out:
              title: "Se déconnecter"
              icon: "logout-box-r-fill"
        menu:
          catalogue: "<strong>Catalogue des API</strong><br> & documentation des données"
          usages: "<strong>Cas d'usages</strong><br> & modalités d'appel"
          developer: "<strong>Espace développeur</strong><br> & spécifications techniques"
          ask_access: "<strong>Demander un accès</strong><br>🔑 Vérifier votre éligibilité"
          banner: "<strong>Migration des jetons</strong> : Bureau ouvert <a href='https://www.eventbrite.com/e/billets-bureau-ouvert-api-entreprise-et-api-particulier-838524398047'>en visio</a> le %{date} à 10 heures."

      footer:
        tagline: Accédez aux données familiales, aux statuts élève, étudiant, boursier, complémentaire santé solidaire et demandeur d'emploi des particuliers pour simplifier leurs démarches administratives.
        external_links:
          - service-public.fr
          - api.gouv.fr
          - api.gouv.fr/les-api/api-particulier

  api_particulier:
    pages:
      home:
        section_welcome:
          title: <strong>Vous êtes un acteur public ?</strong><br />Gagnez du temps dans vos démarches<br />auprès des particuliers !
          subtitle: Intégrez l'API Particulier 👇
          button_endpoints: Les données disponibles
          button_developers: Kit d'intégration
        section_access:
          title_access: Un bouquet d'API pour les agents publics vers les informations administratives des citoyens
          info_data_title: Des données certifiées sans solliciter le citoyen
          info_data_description: Les données sont prises à la source. Plus besoin de demander certains justificatifs aux particuliers. Terminé les fautes de frappes et la vérification manuelle car l’information est certifiée et fait foi.
          info_provider_title: Les fournisseurs de données regroupés
          info_provider_description: API Particulier recherche et démarche pour vous les organisations publiques ayant des données administratives sur les citoyens.
          info_account_title: Un seul interlocuteur à un seul endroit
          info_account_description: API Particulier agrège et restitue les connaissances techniques et fonctionnelles au même endroit. Vous n'avez plus besoin de gérer plusieurs contacts techniques et fonctionnels.
          info_technical_title: Un seul interfaçage technique
          info_technical_description: L’interfaçage est unique et dans des standards à jour des contraintes industrielles. Il n'est plus nécessaire de lire et comprendre les documentations des différentes DSI.
          card_documentation_title: Une documentation métier de chaque API
          card_documentation_description: Liste des données, périmètre de l’API, conditions d’utilisations,&nbsp;...
          card_developers_title: Un espace développeur
          card_developers_description: Spécifications techniques générales et dédiées à chaque API, Swagger, Kit de mise en production,&nbsp;...
          link_faq: "Qu'est-ce qu'une API ?"
        section_use_cases:
          title: Cas d'usages
          description: <strong>Une fois l'API Particulier intégrée dans votre système d'information</strong>&nbsp;:&nbsp;<br>À de l'identité pivot du particulier, d'un identifiant ou avec FranceConnect, les informations sont automatiquement saisies dans les formulaires de vos usagers et en back-office pour vos agents. Cet accès direct aux données administratives facilite de nombreux cas d'usages&nbsp;:&nbsp;
          cards:
            aides_scolarite:
              title: "Aides facultatives à la scolarité"
            cantines-colleges-lycees-tarification:
              title: "Tarification cantine"
            ccas:
              title: "Aides sociales des CCAS"
            tarification_transports:
              title: "Tarification des transports"
            portail_famille:
              title: "Portail famille des communes"
            modalite_appel_france_connect:
              title: "Modalité d'appel : FranceConnect"
          link: "Tous les cas d'usages"
        section_demonstrateur:
          demo_title: Inspirez-vous avec le démonstrateur API Particulier 💡
          demo_description: |-
              Parcourez des exemples d'interfaces fictives pour comprendre comment API Particulier peut simplifier vos démarches en ligne :
          demo_link: https://demonstrateur.particulier.api.gouv.fr
          demo_link_title: Consulter le démonstrateur
        section_partners:
          title: Ils partagent les données au travers d’API Particulier&nbsp;:&nbsp;
          subtitle: Découvrez les API de chaque fournisseur de données.
          link_endpoints: Consulter toutes les API
          link_new_api: Proposer une nouvelle API
        section_developers:
          title: Un espace développeur 🛠 <br>pour intégrer et maintenir l’API
          description: Une documentation technique précise dédiée aux équipes d’intégration.
          prerequisites_link: Les prérequis techniques
          prerequisites_description: La liste des fondamentaux techniques à maitriser, avant de demander un d’accès à l’API Particulier.
          integration_link: Kit d’intégration
          integration_description: Un pas à pas pour intégrer et mettre en production l’API Particulier
          swagger_link: Spécifications techniques de chaque API
          swagger_description: Utilisez notre Swagger (OpenAPI)
      newsletter:
        banner:
          title: Restez informé des nouveautés de l'API Particulier
          description: Recevez les dernières actualités de l'API Particulier et des informations sur les nouvelles API disponibles.
        main:
          newsletter_description: Recevez les dernières actualités de l'API Particulier et des informations sur les nouvelles API disponibles.
          newsletter_title: Inscrivez-vous à la newsletter

