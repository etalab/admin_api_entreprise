  perimeter:
    entity_type_description: |+
      Cette API concerne tous les jeunes, quelle que soit leur nationalité, ayant signé un contrat agréé par l'Agence service civique :
      - ✅ actuellement engagés dans une mission de service civique et donc âgés de 16 à 25 ans, ou jusqu’à 30 ans pour les jeunes en situation de handicap ;
      - ✅ ayant effectué une mission de service civique lors des cinq dernières années.
      Tous les contrats enregistrés par les structures agréées par l’Agence du service civique, qu’elles soient publiques ou associatives, sont inclus dans le périmètre.

      **Ne sont pas concernés par cette API :**
       - ❌ les jeunes ayant effectué une mission de service civique il y a plus de 5 ans ;
       - ❌ les volontariats d’autres dispositifs (volontariat associatif, SNU, VSI, etc.).

    geographical_scope_description: |+
      - ✅ France métropolitaine ;
      - ✅ Départements et Régions d’Outre-mer (DROM) ;
      - ✅ Collectivités d’Outre-mer (COM) [à confirmer] ;
      - ✅ les missions à l’étranger sous tutelle française [à confirmer].

    updating_rules_description: |+
      Les données proviennent des déclarations DSN (déclaration sociale nominative) réalisées par les employeurs chaque mois. L'API est opérée par le GIP MDS (modernisation des déclarations sociales). Elles sont :
      - **mises à jour mensuelle au plus le 21 du mois** suivant la validation, modification ou clôture d’un contrat (m+1). Les données remontées au mois m correspondent donc à l'état du contrat au mois m-1 ;


      ⚠️ **Les DSN étant déclarées le mois suivant le mois travaillé, si un jeune contractualise un contrat de service civique le mois M, l’API sera en mesure de remonter l’information à partir du mois M+1.**

      L’API Service Civique ne remonte donc **que le statut du dernier mois clôturé** (M-1).\
      Nous recommandons donc **de laisser la possibilité au jeune de téléverser un justificatif** si l'API remonte [mettre ici réponse de l'API si pas de contrat]
      

  data:
    description: |+
      Cette API permet de savoir si une personne :
      - est actuellement engagée dans un contrat de service civique,
      - a été engagée dans une mission de service civique lors des 5 dernières années.
      Elle précise les date de début et de fin du contrat. La date de fin de contrat est prévisionnelle en cas de contrat en cours.


