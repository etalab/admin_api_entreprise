      ##### Comment interroger l'API

      - Si l’appel vers l'API est réalisé sans renseigner les paramètres d’appel « date début période » et « date fin période », alors l'API retourne les contrats en cours au moment de l’appel ;
      - Si ces deux paramètres sont renseignés, alors l'API retourne les contrats ayant au moins 1 jour d’activité sur la période demandée ;
      - Si seule la date de début a été renseignée, alors l'API retourne les contrats ayant au moins 1 jour d’activité à partir de cette date, même si le contrat a démarré avant la date renseignée ;
      - Si seule la date de fin a été renseignée, alors l'API retourne les contrats ayant au moins 1 jour d’activité avant cette date, même si le contrat se termine après avant la date renseignée.


