  perimeter:
    entity_type_description: |+
      **Cette API concerne les jeunes de 16 à 25 ans, de nationalité française**.

      **Ne sont pas concernés par cette API** :
      - ❌ les jeunes de nationalité étrangère ;
      - ❌ Les personnes de moins de 16 ans et de plus de 25 ans car elles ne sont pas (moins de 16 ans) ou plus (25 ans et plus) soumises aux obligations du service national ;

    geographical_scope_description: |+
      - ✅ Tous les Français, quel que soit le lieu de résidence. 
    updating_rules_description: |+
      **Les données sont mises à jour trimestriellement** car le processus de recensement en mairie est trimestriel. **Entre 16 et 18 ans, le recensement suffit pour apparaître en règle. Entre 18 et 25 ans, le jeune doit avoir effectué son recensement et sa journée défense et citoyenneté pour apparaître en règle. Ainsi, à partir de 18 ans, si le jeune n'a effectué que son recensement, il apparaîtra comme n'était pas en règle**. Par exemple, Un jeune de 17 ans qui a fait son recensement entre janvier et mars n'apparaîtra en règle dans l'API qu'à partir du mois d'avril au plus tôt. Dans ce cadre, nous recommandons aux administrations de laisser la possibilité l'usager de fournir un justificatif si la réponse de l'API est "Pas en règle" ou "Indeterminé".  
      
      ⚠️ **Les informations obtenues sont représentatives de la situation connue par l'administration chargée du servce national au moment de l'appel**. 
      Cette API est opérée par la direction du service national et de la jeunesse (DSNJ).
