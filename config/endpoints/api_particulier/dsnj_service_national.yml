  faq:
    - q: Qu'est-ce que le service national ?
      a: |+
        **Le service national est composé du rencensement, et de la participation à la journée défense et citoyenneté. Un jeune qui est en règle vis à vis du service national est donc celui qui a effectué son recensement dès l'âge de 16 ans (possibilité de régulariser jusqu'à l'âge de 25 ans) et a participé à la journée défense et citoyenneté au plus tard à l'âge de 18 ans (possibilité de régulariser jusqu'à ses 25 ans)**. [Plus d'informations](https://www.service-public.fr/particuliers/vosdroits/N24)

    - q: <a name="faq-pourquoi-etre-en-regle"></a> Pourquoi un jeune doit être en règle vis à vis du service national ? 
      a: |+
        **Un jeune entre 16 et 25 ans doit être en règle vis à vis du service national s'il souhaite : 
        - passer des examens sous contrôle de l'autorité publique comme le permis de conduire ou le baccalauréat ;
        - passer des concours sous contrôle de l'autorité publique, pour rentrer dans un établissement public de l'enseignement supérieur par exemple ;
        - postuler à un emploi de la fonction publique ; 
        - se présenter à des élections. 
        [Plus d'informations](https://www.data.gouv.fr/fr/dataservices/api-service-national/)

    - q: Une personne porteur de handicap est elle remontée comme étant en règle ? 
      a: |+
        **Un jeune porteur de handicap peut demander une exemption de participation. Si la demande est acceptée, la personne apparaîtra comme étant en règle dans l'API**
